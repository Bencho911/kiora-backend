name: CI — Kiora Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-users-service:
    name: Tests — users-service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/users-service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/users-service/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: npm audit (nivel high)
        run: npm run audit:ci

      - name: Correr tests
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

  migrations-users-service:
    name: Migraciones — users-service (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kiora_migration_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kiora_migration_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: services/users-service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/users-service/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Tests de migraciones (aplica SQL y valida esquema)
        run: npm run test:migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/kiora_migration_ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: kiora_migration_ci
          RUN_MIGRATION_TESTS: 'true'

  test-products-service:
    name: Tests — products-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/products-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/products-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: npm audit (solo critical; ver nota cloudinary en package.json)
        run: npm run audit:ci
      - run: npm test -- --forceExit
        env:
          NODE_ENV: test

  migrations-products-service:
    name: Migraciones — products-service (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kiora_products_migration_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kiora_products_migration_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: services/products-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/products-service/package-lock.json
      - run: npm ci
      - run: npm run test:migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/kiora_products_migration_ci
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: kiora_products_migration_ci
          RUN_MIGRATION_TESTS: 'true'

  test-inventory-service:
    name: Tests — inventory-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/inventory-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run audit:ci
      - run: npm test -- --forceExit
        env:
          NODE_ENV: test

  test-orders-service:
    name: Tests — orders-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orders-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/orders-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run audit:ci
      - run: npm test -- --forceExit
        env:
          NODE_ENV: test

  test-api-gateway:
    name: Tests — api-gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run audit:ci
      - run: npm test -- --forceExit
        env:
          NODE_ENV: test
