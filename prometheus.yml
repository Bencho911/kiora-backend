# Prometheus configuration for Kiora backend
# Scrapes /metrics from each microservice every 15 seconds

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics

  - job_name: 'products-service'
    static_configs:
      - targets: ['products-service:3002']
    metrics_path: /metrics

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:3003']
    metrics_path: /metrics

  - job_name: 'orders-service'
    static_configs:
      - targets: ['orders-service:3004']
    metrics_path: /metrics

  - job_name: 'users-service'
    static_configs:
      - targets: ['users-service:3001']
    metrics_path: /metrics
