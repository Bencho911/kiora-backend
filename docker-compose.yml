# Desarrollo local únicamente: valores por defecto (p. ej. POSTGRES_PASSWORD) no son válidos para producción.
# En entornos reales usa secretos gestionados y variables de entorno; no copies credenciales reales a este archivo.

services:
  # ─────────────────────────────────────────────
  # BASES DE DATOS (una por microservicio)
  # ─────────────────────────────────────────────

  users-db:
    image: postgres:16-alpine
    container_name: kiora_users_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_users
    networks:
      - kiora-backend-net
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_users"]
      interval: 10s
      timeout: 5s
      retries: 5

  products-db:
    image: postgres:16-alpine
    container_name: kiora_products_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_products
    networks:
      - kiora-backend-net
    volumes:
      - products_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_products"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    container_name: kiora_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_inventory
    networks:
      - kiora-backend-net
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifications-db:
    image: postgres:16-alpine
    container_name: kiora_notifications_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_notifications
    networks:
      - kiora-backend-net
    volumes:
      - notifications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    container_name: kiora_orders_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_orders
    networks:
      - kiora-backend-net
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # INFRAESTRUCTURA COMPARTIDA
  # ─────────────────────────────────────────────

  # Redis — blacklist de tokens JWT + pub/sub de notificaciones
  kiora-redis:
    image: redis:7-alpine
    container_name: kiora_redis
    restart: unless-stopped
    networks:
      - kiora-backend-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — interfaz visual (se conecta a los 5 databases)
  kiora-pgadmin:
    image: dpage/pgadmin4
    container_name: kiora_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiora.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - kiora-backend-net
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - users-db
      - products-db
      - inventory-db
      - orders-db
      - notifications-db

  # ─────────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: kiora_api_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - kiora-public-net
      - kiora-backend-net
    env_file:
      - ./services/api-gateway/.env.docker
    environment:
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      REDIS_HOST: kiora-redis
      USERS_SERVICE_URL: http://users-service:3001
      PRODUCTS_SERVICE_URL: http://products-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      ORDERS_SERVICE_URL: http://orders-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3005
      REPORTS_SERVICE_URL: http://reports-service:3006
      ACTIVITY_SERVICE_URL: http://activity-service:3007
      AI_SERVICE_URL: http://ai-service:3008
    depends_on:
      kiora-redis:
        condition: service_healthy
      users-service:
        condition: service_started
      products-service:
        condition: service_started
      inventory-service:
        condition: service_started
      orders-service:
        condition: service_started
      notifications-service:
        condition: service_started
      reports-service:
        condition: service_started
      activity-service:
        condition: service_started
      ai-service:
        condition: service_started

  users-service:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    container_name: kiora_users_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/users-service/.env.docker
    environment:
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: kiora_users
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-rootpassword}@users-db:5432/kiora_users
      REDIS_HOST: kiora-redis
      REDIS_PORT: 6379
      OTEL_SERVICE_NAME: users-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      users-db:
        condition: service_healthy
      kiora-redis:
        condition: service_healthy

  products-service:
    build:
      context: ./services/products-service
      dockerfile: Dockerfile
    container_name: kiora_products_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/products-service/.env.docker
    environment:
      DB_HOST: products-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: kiora_products
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-rootpassword}@products-db:5432/kiora_products
      REDIS_HOST: kiora-redis
      OTEL_SERVICE_NAME: products-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    volumes:
      - products_uploads:/app/src/public/uploads
    depends_on:
      products-db:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: kiora_inventory_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/inventory-service/.env.docker
    environment:
      DB_HOST: inventory-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: kiora_inventory
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-rootpassword}@inventory-db:5432/kiora_inventory
      REDIS_HOST: kiora-redis
      REDIS_PORT: 6379
      ADMIN_EMAIL: ruben.camilo321@gmail.com
      PRODUCTS_SERVICE_URL: http://products-service:3002
      USERS_SERVICE_URL: http://users-service:3001
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      inventory-db:
        condition: service_healthy

  orders-service:
    build:
      context: ./services/orders-service
      dockerfile: Dockerfile
    container_name: kiora_orders_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/orders-service/.env.docker
    environment:
      DB_HOST: orders-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: kiora_orders
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-rootpassword}@orders-db:5432/kiora_orders
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      OTEL_SERVICE_NAME: orders-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      orders-db:
        condition: service_healthy

  notifications-service:
    build:
      context: ./services/notifications-service
      dockerfile: Dockerfile
    container_name: kiora_notifications_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/notifications-service/.env.docker
    environment:
      DB_HOST: notifications-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: kiora_notifications
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-rootpassword}@notifications-db:5432/kiora_notifications
      REDIS_HOST: kiora-redis
      REDIS_PORT: 6379
    depends_on:
      notifications-db:
        condition: service_healthy
      kiora-redis:
        condition: service_healthy

  reports-service:
    build:
      context: ./services/reports-service
      dockerfile: Dockerfile
    container_name: kiora_reports_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/reports-service/.env.docker
    depends_on:
      - orders-service

  # ─────────────────────────────────────────────
  # OBSERVABILIDAD
  # ─────────────────────────────────────────────

  # Jaeger — Distributed Tracing UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: kiora_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - kiora-backend-net

  # Prometheus — Métricas
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kiora_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - kiora-backend-net

  # Grafana — Dashboards
  grafana:
    image: grafana/grafana:11.2.2
    container_name: kiora_grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - kiora-backend-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger

  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: kiora_telegram_bot
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/telegram-bot/.env.docker
    environment:
      REDIS_HOST: kiora-redis
      REDIS_PORT: 6379
      API_GATEWAY_URL: http://api-gateway:3000/api
    depends_on:
      kiora-redis:
        condition: service_healthy

  activity-db:
    image: postgres:16-alpine
    container_name: kiora_activity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: kiora_activity
    networks:
      - kiora-backend-net
    volumes:
      - activity_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d kiora_activity"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: kiora_ai_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/ai-service/.env.docker
    environment:
      API_GATEWAY_URL: http://api-gateway:3000/api

  activity-service:
    build:
      context: ./services/activity-service
      dockerfile: Dockerfile
    container_name: kiora_activity_service
    restart: unless-stopped
    networks:
      - kiora-backend-net
    env_file:
      - ./services/activity-service/.env.docker
    environment:
      DB_HOST: activity-db
      DB_PORT: 5432
    depends_on:
      activity-db:
        condition: service_healthy

networks:
  kiora-public-net:
    external: true
  kiora-backend-net:
    name: kiora-backend-net
    driver: bridge

volumes:
  users_db_data:
  products_db_data:
  products_uploads:
  inventory_db_data:
  orders_db_data:
  notifications_db_data:
  activity_db_data:
  redis_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

